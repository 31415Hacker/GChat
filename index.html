<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GChat</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="auth-view">
    <div class="auth-container">
      <h1>GChat</h1>
      <p class="subtitle">Sign in to start chatting</p>

      <div id="auth-error" class="error"></div>

      <form id="email-signin-form">
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit" id="signin-btn">Sign In</button>
        <button type="button" id="signup-btn" class="secondary">Create Account</button>
      </form>

      <div class="divider"><span>or</span></div>

      <button id="google-signin-btn" class="google-btn">
        <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.54 28.59A14.5 14.5 0 019.5 24c0-1.59.28-3.14.76-4.59l-7.98-6.19A23.99 23.99 0 000 24c0 3.77.87 7.35 2.56 10.56l7.98-5.97z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 5.97C6.51 42.62 14.62 48 24 48z"/></svg>
        Sign in with Google
      </button>

      <p id="toggle-auth-text" class="toggle-text">Don't have an account? <a href="#" id="toggle-auth">Sign up</a></p>
    </div>
  </div>

  <div id="chat-view" style="display: none;">
    <header>
      <h1>GChat</h1>
      <div id="user-info">
        <img id="user-photo" src="" alt="">
        <span id="user-name"></span>
        <button id="signout-btn">Sign Out</button>
      </div>
    </header>

    <main id="message-list">
    </main>

    <form id="message-form">
      <input type="text" id="message-input" placeholder="Type a message..." required>
      <button type="submit">Send</button>
    </form>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
